name: schema-validation-tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  schema-validation-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # pnpm via corepack — pnpm/action-setup is not on the org Actions allowlist
      # (was causing startup_failure).
      - name: Enable pnpm via corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.6.0 --activate
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
      - name: Run schema validation tests
        run: pnpm --filter @socioprophet/synapseiq-schema-validation-tests test
