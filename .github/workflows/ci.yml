name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # pnpm via corepack (bundled with Node) — the org Actions allowlist
      # (github-owned + verified + dtolnay/Swatinem/oven-sh/tauri-apps) does not
      # include pnpm/action-setup, which caused every run to startup_failure.
      - name: Enable pnpm via corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.6.0 --activate
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
      - name: Typecheck
        run: pnpm typecheck
